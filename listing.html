<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listing — Marka</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js" defer></script>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/listing.css" />
  </head>
  <body>
    <div class="page">
      <div class="shell">

        <!-- Mobile / tablet top bar -->
        <header class="topbar topbar--mobile">
          <button class="icon-btn" id="menuBtn" aria-label="Menu">
            <i data-lucide="menu"></i>
          </button>
          <div class="brand">
            <span class="brand-mark">M</span>
            <span class="brand-name">Marka</span>
          </div>
          <button class="icon-btn icon-btn--dot" aria-label="Notifications">
            <i data-lucide="bell"></i>
          </button>
        </header>

        <!-- Desktop / laptop top nav -->
        <header class="topbar topbar--desktop">
          <div class="brand">
            <span class="brand-mark brand-mark--lg">M</span>
            <span class="brand-name brand-name--lg">Marka</span>
          </div>
          <nav class="nav-links" id="navLinks"></nav>
          <div class="topbar-actions">
            <button class="icon-btn icon-btn--dot" aria-label="Notifications">
              <i data-lucide="bell"></i>
            </button>
            <button class="post-ad-btn">
              <i data-lucide="plus" class="accent-icon"></i> Post ad
            </button>
            <div class="avatar">JD</div>
          </div>
        </header>

        <!-- Breadcrumb -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

        <!-- Image gallery -->
        <section class="gallery">
          <div class="gallery-main" id="galleryMain"></div>
          <div class="gallery-thumbs" id="galleryThumbs"></div>
        </section>

        <!-- Title, price, meta -->
        <section class="listing-header">
          <h1 class="listing-title" id="listingTitle"></h1>
          <div class="price-stub--lg" id="listingPrice"></div>
          <div class="listing-meta">
            <span class="listing-meta-item"><i data-lucide="map-pin"></i><span id="listingLoc"></span></span>
            <span class="listing-meta-item"><i data-lucide="calendar"></i><span id="listingDate"></span></span>
            <span class="condition-badge"><i data-lucide="shield-check"></i><span id="listingCondition"></span></span>
          </div>
        </section>

        <!-- Seller card + actions -->
        <section class="section">
          <div class="seller-card" id="sellerCard"></div>
          <div class="action-buttons">
            <a class="btn-primary" id="messageSellerBtn" href="#">
              <i data-lucide="message-circle"></i> Message Seller
            </a>
            <a class="btn-secondary" id="callSellerBtn" href="#">
              <i data-lucide="phone"></i> Call Seller
            </a>
          </div>
          <button class="btn-share" id="shareListingBtn">
            <i data-lucide="share-2"></i> Share Listing
          </button>
        </section>

        <!-- Description -->
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">Description</h2>
          </div>
          <div class="listing-description" id="listingDescription"></div>
        </section>

        <!-- Features / specifications -->
        <section class="section">
          <div class="section-head">
            <h2 class="section-title">Features &amp; specifications</h2>
          </div>
          <div class="specs-grid" id="specsGrid"></div>
        </section>

        <!-- Safety tips -->
        <section class="section">
          <div class="safety-box">
            <div class="safety-box-head"><i data-lucide="shield-check"></i> Safety tips</div>
            <ul class="safety-list" id="safetyList"></ul>
          </div>
        </section>

        <!-- Similar listings -->
        <section class="section section--latest">
          <div class="section-head">
            <h2 class="section-title">Similar listings</h2>
            <div class="show-all">Show all <i data-lucide="chevron-right"></i></div>
          </div>
          <div class="featured-row" id="similarRow"></div>
        </section>

        <!-- Bottom nav — mobile & tablet only; laptop/desktop use the top nav above -->
        <nav class="bottom-nav" id="bottomNav"></nav>
      </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/listing-data.js"></script>
    <script src="js/listing.js"></script>
  </body>
</html>
